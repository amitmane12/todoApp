    <title>Doc</title>
    <link rel="stylesheet" href="./style.css" />

    <h1>MY TODO APP</h1>

      <!-- <label for="inputItem">todo</label> -->

    <main>

            <div class="b">

                ><input type="checkbox" name="status" class="tdStatus" />
              </span>

              <span>

              /></span>

              <span> <img src="./edit.png" alt="edit" class="edit-btn" /></span>

      </div>

  <script src="./todov3.js"></script>
