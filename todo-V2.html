<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dom Practice todo-app</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>TO DO App - DOM PRACTICE</h1>
    </header>
    <main>
      <div class="cp">
        <button id="addBtn">Add</button>
        <div class="note">
          <textarea
            name="inputItem"
            id="inputItem"
            placeholder="..todo"
          ></textarea>
        </div>
      </div>

      <div>
        <ul id="itemList">
          <li>
            <span class="text">JS </span>
            <button class="removeItemBtn">❌</button>
          </li>
        </ul>
      </div>
    </main>
  </body>

  <script>
    const itemUL = document.querySelector("#itemList");
    const inputItem = document.querySelector("#inputItem");
    const addBtn = document.querySelector("#addBtn");

   
    addBtn.addEventListener("click", addItem);
    inputItem.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        addItem();
      }
    });
    itemUL.addEventListener("click", removeItem);
    itemUL.addEventListener("dblclick", editItem);
    itemUL.addEventListener("keydown", saveItem);

    function saveItem(e) {
      if (e.key === "Enter") {
        const updatedText = e.target.closest("span.text");
        if (!updatedText) return;

        e.preventDefault(); // prevent new line
        updatedText.contentEditable = "false";
      }
    }
    function editItem(e) {
      const li = e.target.closest("span.text");
      if (!li) return;

      li.contentEditable = "true";
      li.focus();
    }
    function removeItem(e) {
      const btn = e.target.closest(".removeItemBtn");
      if (!btn) return;

      btn.parentElement.remove();
    }
    function addItem(e) {
      //   if (!inputItem.value) return;
      if (!inputItem.value) {
        alert("please add a valid value");
        return;
      }

      const item = document.createElement("li");
      item.innerHTML = `<span class="text">${inputItem.value}</span> <button class="removeItemBtn">❌</button>`;
      itemUL.appendChild(item);
      inputItem.value = "";
    }
  </script>
</html>
