<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dom Practice todo-app</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #111111;
        color: #fff;
      }
      header {
        border: 1px solid gray;
        padding: 10px;
        text-align: center;
        text-shadow: 1px 1px 0.1px rgba(255, 0, 200, 0.573);
      }
      ul {
        padding: 20px;
        margin-top: 100px;
        border: 1px solid;
        list-style: none;
        background-color: black;
        display: flex;
        /* justify-content: center; */
        flex-wrap: wrap;
        position: relative;
        /* align-items: center; */
      }
      ul li {
        padding: 25px;
        margin: 10px;
        border: 1px solid rgb(53, 28, 176);
        box-sizing: border-box;
        display: inline-block;
        font-family: cursive;
        cursor: pointer;
        width: 25%;
        height: 200px;
        scrollbar-width: thin;
        overflow: auto;
        position: relative;
        /* max-height: 100px; */
        /* max-width: 300px; */

        /* background-color: rgba(142, 142, 31, 0.748); */
        /* display: flex; */
        scrollbar-width: none;
      }
      li::selection {
        background-color: yellow;
        color: black;
      }
      li:hover {
        background-color: rgba(10, 79, 135, 0.2);
      }
      li:focus {
        /* background-color: rgba(10, 79, 135, 0.2); */
        outline: none;
        /* border-color: #00ff88; */
        box-shadow: 0 0 5px #0133f9;
      }
      ul li button {
        margin-left: 10px;
        background-color: transparent;
        border: none;
        color: red;
        font-size: 15px;
        cursor: pointer;
        position: absolute;
        right: 10px;
        top: 10px;
      }
      #addBtn {
        margin: 10px;
        padding: 10px;
        background-color: rgba(6, 104, 231, 0.722);
        color: #fff;
        border: none;
        cursor: pointer;
        border-radius: 1em;
      }
      #inputItem {
        padding: 5px;
        background-color: transparent;
        border-radius: 10px;
        border-color: blue;
        color: #212121;
        color: rgba(227, 4, 227, 0.47);
        font-family: cursive;
      }
      input:focus,
      textarea:focus {
        outline: none;
        /* border-color: #00ff88; */
        box-shadow: 0 0 5px #062292;
      }
      .cp {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 50px;
        gap: 20px;
      }
      .note {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .text {
        display: inline-block;
        max-width: 100%;
        /* white-space: pre-wrap; */
        word-wrap: break-word;

        overflow: auto;
      }
      /* .removeItemBtn {
        margin-left: 10px;
        background-color: transparent;
        border: none;
        color: red;
        font-size: 15px;
        cursor: pointer;
      } */
    </style>
  </head>
  <body>
    <header>
      <h1>TO DO App - DOM PRACTICE</h1>
    </header>
    <main>
      <div class="cp">
        <button id="addBtn">Add</button>
        <div class="note">
          <!-- <input
            type="text"
            name="inputItem"
            id="inputItem"
            placeholder="title"
          /> -->
          <textarea
            name="inputItem"
            id="inputItem"
            placeholder="..todo"
          ></textarea>
        </div>
      </div>

      <div>
        <ul id="itemList">
          <li>
            <span class="text">JS </span>
            <button class="removeItemBtn">❌</button>
          </li>
        </ul>
      </div>
    </main>
  </body>

  <script>
    const itemUL = document.querySelector("#itemList");
    const inputItem = document.querySelector("#inputItem");
    const addBtn = document.querySelector("#addBtn");

    // addBtn.addEventListener("click", () => {
    //   const item = document.createElement("li");

    //   item.innerHTML = `${inputItem.value} <button class="removeItemBtn">❌</button>`;
    //   itemUL.appendChild(item);
    //   inputItem.value = "";
    // });
    addBtn.addEventListener("click", addItem);
    inputItem.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        addItem();
      }
    });

    // itemUL.addEventListener("click", (e) => {
    //   const btn = e.target.closest(".removeItemBtn");
    //   if (!btn) return;

    //   btn.parentElement.remove();
    // });
    itemUL.addEventListener("click", removeItem);
    itemUL.addEventListener("dblclick", editItem);
    itemUL.addEventListener("keydown", saveItem);

    function saveItem(e) {
      if (e.key === "Enter") {
        const updatedText = e.target.closest("span.text");
        if (!updatedText) return;

        e.preventDefault(); // prevent new line
        updatedText.contentEditable = "false";
      }
    }
    function editItem(e) {
      const li = e.target.closest("span.text");
      if (!li) return;

      li.contentEditable = "true";
      li.focus();
    }
    function removeItem(e) {
      const btn = e.target.closest(".removeItemBtn");
      if (!btn) return;

      btn.parentElement.remove();
    }
    function addItem(e) {
      //   if (!inputItem.value) return;
      if (!inputItem.value) {
        alert("please add a valid value");
        return;
      }

      const item = document.createElement("li");
      item.innerHTML = `<span class="text">${inputItem.value}</span> <button class="removeItemBtn">❌</button>`;
      itemUL.appendChild(item);
      inputItem.value = "";
    }
  </script>
</html>
